name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint action.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: actionlint
        uses: raven-actions/actionlint@v2
        with:
          files: "action.yml .github/workflows/*.yml"

  smoke:
    name: Smoke test (CLI installs and shows help)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install -g @sweny-ai/core@latest
      - run: sweny --help
      - run: sweny triage --help
